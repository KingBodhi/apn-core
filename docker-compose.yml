# APN CORE Server - Docker Compose Configuration
# Production deployment with optional monitoring

version: '3.8'

services:
  apn-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apn-core
    restart: unless-stopped
    ports:
      - "${APN_PORT:-8000}:8000"
    environment:
      - APN_HOST=0.0.0.0
      - APN_PORT=8000
      - APN_LOG_LEVEL=${APN_LOG_LEVEL:-INFO}
      - APN_DEBUG=${APN_DEBUG:-false}
      - APN_CORS_ORIGINS=${APN_CORS_ORIGINS:-http://localhost:3000}
      - APN_API_KEY=${APN_API_KEY:-}
      - APN_RATE_LIMIT=${APN_RATE_LIMIT:-60}
      - APN_NATS_RELAY=${APN_NATS_RELAY:-nats://nonlocal.info:4222}
      - APN_KNOWN_PEERS=${APN_KNOWN_PEERS:-https://dashboard.powerclubglobal.com,https://pythia.nonlocal.info}
      - APN_NORA_URL=${APN_NORA_URL:-http://nora:3003}
    volumes:
      - apn-data:/home/apn/.apn
      - apn-logs:/home/apn/.apn/logs
    networks:
      - apn-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.apn-core.rule=Host(`apn.${DOMAIN:-localhost}`)"
      - "traefik.http.routers.apn-core.tls=true"
      - "traefik.http.routers.apn-core.tls.certresolver=letsencrypt"
      - "traefik.http.services.apn-core.loadbalancer.server.port=8000"

  # Optional: Redis for session caching (future enhancement)
  # redis:
  #   image: redis:7-alpine
  #   container_name: apn-redis
  #   restart: unless-stopped
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - apn-network
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3

volumes:
  apn-data:
    driver: local
  apn-logs:
    driver: local
  # redis-data:
  #   driver: local

networks:
  apn-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
